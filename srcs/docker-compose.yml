services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    volumes: 
      - wp_db:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    restart: always
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
      - redis
    volumes: 
      - wp_files:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: always
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes: 
      - wp_files:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: always
#bonus redis
  redis:
    build: ./bonus/redis
    container_name: redis
    networks:
      - inception
    restart: always
#bonus ftp
  ftp:
      build: ./bonus/ftp
      container_name: ftp
      depends_on:
        - wordpress
      ports:
        - "21:21"
        - "11110-11111:11110-11111"
      volumes:
        - wp_files:/var/www/html
      networks:
        - inception
      env_file:
        - .env
      restart: always
#bonus static website
  website:
    build: ./bonus/website
    container_name: website
    ports:
      - "1111:80"
    networks:
      - inception
    restart: always
#bonus adminer
  adminer:
    build: ./bonus/adminer
    container_name: adminer
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    networks:
      - inception
    restart: always
#bonus resources monitor
  netdata:
    build: ./bonus/netdata
    container_name: netdata
    ports:
      - "19999:19999"
    networks:
      - inception
    restart: always

volumes:
  wp_files:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/selbouka/data/wordpress
  wp_db:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/selbouka/data/mariadb

networks:
  inception:
    driver: bridge
